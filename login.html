<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro - ConectaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="container">
        <!-- Banner Lateral -->
        <div class="banner">
            <h1>ConectaPro</h1>
            <p>Junte-se à nossa comunidade e faça parte da transformação da educação!</p>
        </div>

        <!-- Área de Formulários -->
        <div class="forms-wrapper">
            
            <!-- Formulário de Login -->
            <div id="login-section" class="form-section active">
                <h2>Bem-vindo de volta!</h2>
                <form action="index.html" method="GET">
                    <div class="form-group">
                        <label for="login-email">E-mail</label>
                        <input type="email" id="login-email" name="email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="login-senha">Senha</label>
                        <input type="password" id="login-senha" name="senha" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn">Entrar</button>
                </form>
                <div class="toggle-link">
                    Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
